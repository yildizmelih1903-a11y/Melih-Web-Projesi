    <section id="iletisim" class="container mt-5 pt-4 mb-5">
        
        <header class="pb-3 mb-4 border-bottom">
            <h2 class="text-primary fw-bold">İletişime Geç</h2>
            <p class="lead text-muted">Aşağıdaki formu doldurarak benimle iletişime geçebilirsiniz.</p>
        </header>

        <div class="row bg-white shadow-sm rounded p-4 border-0" id="vue-app">
            <div class="col-md-12 mb-4 mb-md-0">
                
                <form id="iletisimFormu" method="POST" action="iletisim_sonuc.php">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="adSoyad" class="form-label fw-bold">Adınız Soyadınız (Text)</label>
                            <input type="text" class="form-control bg-light border-0 p-3" id="adSoyad" name="adSoyad" v-model="form.ad" placeholder="Örn: Melih Yıldız">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label fw-bold">E-posta Adresiniz (Email)</label>
                            <input type="text" class="form-control bg-light border-0 p-3" id="email" name="email" v-model="form.email" placeholder="mail@ornek.com">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="telefon" class="form-label fw-bold">Telefon (Sadece Rakam)</label>
                            <input type="text" class="form-control bg-light border-0 p-3" id="telefon" name="telefon" v-model="form.telefon" placeholder="05551234567">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="konu" class="form-label fw-bold">Konu (Select)</label>
                            <select class="form-select bg-light border-0 p-3" id="konu" name="konu" v-model="form.konu">
                                <option value="">Seçiniz...</option>
                                <option value="Is Birligi">İş Birliği</option>
                                <option value="Proje Teklifi">Proje Teklifi</option>
                                <option value="Diger">Diğer</option>
                            </select>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold d-block">Cinsiyetiniz (Radio)</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="form.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın" v-model="form.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label for="mesaj" class="form-label fw-bold">Mesajınız (Textarea)</label>
                            <textarea class="form-control bg-light border-0 p-3" id="mesaj" name="mesaj" rows="4" v-model="form.mesaj" placeholder="Mesajınızı buraya yazabilirsiniz..."></textarea>
                        </div>

                        <div class="col-md-12 mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="kvkk" name="kvkk" v-model="form.kvkk">
                                <label class="form-check-label" for="kvkk">KVKK aydınlatma metnini okudum ve onaylıyorum (Checkbox)</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 mt-2">
                        <button type="button" class="btn btn-warning px-4 py-2 w-50 fw-bold shadow-sm" id="btnNativeJS">Native JS ile Gönder</button>
                        <button type="button" class="btn btn-success px-4 py-2 w-50 fw-bold shadow-sm" @click="vueKontrol">Vue.js ile Gönder</button>
                    </div>
                </form>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    form: { ad: '', email: '', telefon: '', konu: '', cinsiyet: '', mesaj: '', kvkk: false }
                }
            },
            methods: {
                vueKontrol() {
                    const f = this.form;
                    if (!f.ad || !f.email || !f.telefon || !f.konu || !f.cinsiyet || !f.mesaj) {
                        alert("Vue.js Diyor ki: Lütfen tüm alanları doldurun!");
                        return;
                    }
                    if (!f.email.includes('@')) {
                        alert("Vue.js Diyor ki: E-posta adresi geçersiz!");
                        return;
                    }
                    if (!/^\d+$/.test(f.telefon)) {
                        alert("Vue.js Diyor ki: Telefon numarası SADECE rakamlardan oluşmalıdır!");
                        return;
                    }
                    if (!f.kvkk) {
                        alert("Vue.js Diyor ki: KVKK metnini onaylamalısınız!");
                        return;
                    }
                    alert("Vue.js Kontrolü Başarılı! Veriler PHP sunucusuna gönderiliyor...");
                    document.getElementById('iletisimFormu').submit();
                }
            }
        }).mount('#vue-app');
    </script>

    <script>
        document.getElementById('btnNativeJS').addEventListener('click', function() {
            const ad = document.getElementById('adSoyad').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefon = document.getElementById('telefon').value.trim();
            const konu = document.getElementById('konu').value;
            const mesaj = document.getElementById('mesaj').value.trim();
            const kvkk = document.getElementById('kvkk').checked;
            
            const cinsiyetler = document.getElementsByName('cinsiyet');
            let cinsiyetSecili = false;
            for(let i=0; i<cinsiyetler.length; i++){
                if(cinsiyetler[i].checked) cinsiyetSecili = true;
            }

            if(ad === "" || email === "" || telefon === "" || konu === "" || mesaj === "" || !cinsiyetSecili) {
                alert("Native JS Diyor ki: Lütfen formdaki tüm alanları doldurun!");
                return;
            }
            if(!email.includes("@")) {
                alert("Native JS Diyor ki: Lütfen geçerli bir e-posta girin!");
                return;
            }
            const rakamKontrol = /^[0-9]+$/;
            if(!rakamKontrol.test(telefon)) {
                alert("Native JS Diyor ki: Telefon numarası SADECE rakam giriniz!");
                return;
            }
            if(!kvkk) {
                alert("Native JS Diyor ki: Lütfen KVKK onay kutusunu işaretleyiniz!");
                return;
            }
            
            alert("Native JS Kontrolü Başarılı! Veriler PHP sunucusuna gönderiliyor...");
            document.getElementById('iletisimFormu').submit();
        });
    </script>
